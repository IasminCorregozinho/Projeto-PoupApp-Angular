<app-card>
  <ng-container card-titulo>
  <img card-titulo src="icones/saldo.svg" alt="">
  <h2 card-titulo class="texto-lg">Saldo disponível:</h2>
  </ng-container>
  <span
      class="valor texto-xxxl"
    [appDestaqueValorNumerico]="saldo()"
    corPositiva="var(--violeta-destaque)"
    >
    {{ saldo() | currency: "BRL" }}
 </span>
</app-card>
